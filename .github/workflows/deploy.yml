name: CI/CD — Deploy SmartCart API

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer les tests
        run: python manage.py test --verbosity=2
        env:
          DJANGO_SECRET_KEY: "ci-test-secret-key-not-used-in-prod"

  deploy:
    name: Déploiement sur VPS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "Mise à jour du code..."
            cd /var/www/django_api/django_api
            git pull origin main

            echo "Activation de venv..."
            source /var/www/django_api/venv/bin/activate

            echo "Installation des dépendances..."
            pip install -r requirements.txt

            echo "Application des migrations..."
            python manage.py migrate --noinput

            echo "Collecte des fichiers statiques..."
            python manage.py collectstatic --noinput

            echo "Redémarrage du service gunicorn..."
            sudo systemctl restart smartcart

            echo "Déploiement terminé avec succès !"
